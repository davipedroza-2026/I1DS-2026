<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML | Aula 05</title>
    <link rel="stylesheet" href="Aula-05.css">
</head>
<body>
    <div id="formulario">
        <h1>Cadastro de Alunos</h1>
        <form method="get" action=""> <!-- Elemento de Formulario -->
            <label for="inNome">Nome: </label>
            <input type="text" name="inNome"/>
            <br/>

            <label for="inEmail">Email:</label>
            <input type="email" nome="inEmail"/>
            <br/>

            <label for="inSenha">Senha: </label>
            <input type="password" name="inSenha"/>
             <br/>

            <label for="inData">Data de Nascimento</label>
            <input type="datatime-local" name="inDataCad"/>
            <br/>
            
            <label for="InCEP">CEP: </label>
            <input type="number" step="1" name="InCEP"/>
            <br/>


        </form>
    </div>
</body>
</html>
